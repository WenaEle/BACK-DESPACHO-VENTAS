name: CI/CD - Back Despachos

on:
  push:
    branches: [main]
  workflow_dispatch: {}

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: 230074771520.dkr.ecr.us-east-1.amazonaws.com
  EKS_CLUSTER_NAME: innovatech-cluster
  K8S_NAMESPACE: innovatech
  APP_DIR: Springboot-API-REST-DESPACHO

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Test
        working-directory: ${{ env.APP_DIR }}
        run: chmod +x mvnw && ./mvnw -B test

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login en Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & push imagen (despachos-api)
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.APP_DIR }}
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/despachos-api:latest
            ${{ env.ECR_REGISTRY }}/despachos-api:${{ github.sha }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Actualizar kubeconfig del clúster EKS
        run: aws eks update-kubeconfig --name ${{ env.EKS_CLUSTER_NAME }} --region ${{ env.AWS_REGION }}

      # No aplica ningún yaml: asume que el Deployment "back-despachos" ya
      # existe en el clúster (aplicado localmente por ti). Solo actualiza
      # la imagen a la que se acaba de construir y espera el rollout.
      - name: Actualizar imagen de back-despachos
        run: |
          kubectl set image deployment/back-despachos back-despachos=${{ env.ECR_REGISTRY }}/despachos-api:${{ github.sha }} -n ${{ env.K8S_NAMESPACE }}
          kubectl rollout status deployment/back-despachos -n ${{ env.K8S_NAMESPACE }} --timeout=180s
